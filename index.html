<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurioCartes PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #10B981;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .status-badge {
            background-color: #E0E7FF;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        /* Système de Carte 3D */
        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 420px;
            cursor: pointer;
            display: none;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .flip-card-front { font-size: 1.4rem; font-weight: bold; line-height: 1.4; }
        
        .flip-card-back {
            transform: rotateY(180deg);
            text-align: left;
            font-size: 0.95rem;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .back-section { margin-bottom: 15px; }
        .back-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; font-size: 0.85rem; text-transform: uppercase;}

        /* Ecrans Quiz et Attente */
        .quiz-container, .wait-container {
            display: none;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 350px;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .quiz-header {
            color: var(--secondary);
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #4338CA; }
        .quiz-btn { background-color: #F3F4F6; color: var(--text-main); text-align: left; padding: 12px 15px; font-weight: normal;}
        .quiz-btn:hover { background-color: #E5E7EB; }

        .instruction {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h2>CurioCartes</h2>
        <div class="status-badge" id="status-badge">Chargement...</div>
    </header>

    <div class="app-container">
        
        <div class="flip-card" id="card-view" onclick="flipCard()">
            <div class="flip-card-inner" id="card-inner">
                <div class="flip-card-front" id="card-front"></div>
                <div class="flip-card-back">
                    <div class="back-section">
                        <div class="back-title">L'Explication</div>
                        <div id="card-exp"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-title">L'Analogie 💡</div>
                        <div id="card-ana"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-title">Le Fun Fact 🍿</div>
                        <div id="card-fun"></div>
                    </div>
                    <button onclick="finishDiscovery(event)" style="margin-top: auto;">J'ai compris !</button>
                </div>
            </div>
        </div>
        <div class="instruction" id="card-instruction">Appuyez sur la carte pour la retourner</div>

        <div class="quiz-container" id="quiz-view">
            <div class="quiz-header">🧠 Mode Révision</div>
            <p id="quiz-question" style="font-weight: bold; margin-bottom: 20px; font-size: 1.2rem;"></p>
            <div id="quiz-options"></div>
        </div>

        <div class="wait-container" id="wait-view">
            <h3>Repos Neuronal 🔋</h3>
            <p>Ton cerveau a besoin d'assimiler.</p>
            <p style="margin-top: 20px; color: var(--text-muted);">Reviens plus tard pour tes révisions ou de nouvelles découvertes.</p>
        </div>

    </div>

    <script>
        // --- CONFIGURATION SCIENTIFIQUE DE LA MÉMOIRE ---
        // Les intervalles de répétition espacée (en millisecondes)
        const INTERVALS = [
            4 * 60 * 60 * 1000,   // Niveau 0 : 4 heures (pour tester rapidement, remplace par 60 * 1000 pour 1 minute)
            24 * 60 * 60 * 1000,  // Niveau 1 : 24 heures
            3 * 24 * 60 * 60 * 1000, // Niveau 2 : 3 jours
            7 * 24 * 60 * 60 * 1000  // Niveau 3 : 7 jours
        ];
        
        const MAX_NEW_CARDS_PER_SESSION = 3;

        // --- VARIABLES D'ÉTAT ---
        let deck = [];
        let memoryData = JSON.parse(localStorage.getItem('curio_memory')) || {}; 
        // Structure de memoryData : { "indexCarte": { level: 0, nextReview: timestamp } }

        let pendingReviews = []; // Index des cartes à réviser
        let availableNewCards = []; // Index des cartes jamais vues
        let sessionNewCardsCount = 0; // Compteur pour limiter la surcharge cognitive
        
        let currentCardIndex = null;
        let currentMode = ''; // 'REVIEW' ou 'DISCOVER'

        // --- ÉLÉMENTS DU DOM ---
        const cardView = document.getElementById('card-view');
        const quizView = document.getElementById('quiz-view');
        const waitView = document.getElementById('wait-view');
        const instruction = document.getElementById('card-instruction');
        const statusBadge = document.getElementById('status-badge');

        // --- 1. INITIALISATION ---
        async function initApp() {
            try {
                const response = await fetch('cards.json');
                if (!response.ok) throw new Error("Erreur réseau");
                deck = await response.json();
                analyzeMemory();
            } catch (error) {
                console.error("Impossible de charger les cartes.", error);
            }
        }

        // --- 2. TRI DES CARTES (Cerveau de l'appli) ---
        function analyzeMemory() {
            const now = Date.now();
            pendingReviews = [];
            availableNewCards = [];

            deck.forEach((card, index) => {
                const cardMemory = memoryData[index];
                
                if (cardMemory) {
                    // La carte a déjà été vue. Est-il l'heure de la réviser ?
                    if (now >= cardMemory.nextReview) {
                        pendingReviews.push(index);
                    }
                } else {
                    // La carte n'a jamais été lue
                    availableNewCards.push(index);
                }
            });

            routeSession();
        }

        // --- 3. AIGUILLAGE DE LA SESSION ---
        function routeSession() {
            // RÈGLE D'OR : Les révisions priment sur les nouveautés
            if (pendingReviews.length > 0) {
                currentMode = 'REVIEW';
                currentCardIndex = pendingReviews[0];
                statusBadge.innerText = `🔄 ${pendingReviews.length} Révision(s)`;
                showQuiz();
            } 
            // S'il n'y a plus de révision, on peut découvrir
            else if (availableNewCards.length > 0 && sessionNewCardsCount < MAX_NEW_CARDS_PER_SESSION) {
                currentMode = 'DISCOVER';
                currentCardIndex = availableNewCards[0];
                statusBadge.innerText = `✨ Nouvelle Découverte`;
                showDiscovery();
            } 
            // Sinon, repos !
            else {
                showWaitScreen();
            }
        }

        // --- 4. MODE DÉCOUVERTE (Encodage) ---
        function showDiscovery() {
            const card = deck[currentCardIndex];
            document.getElementById('card-front').innerText = card.front;
            document.getElementById('card-exp').innerText = card.exp;
            document.getElementById('card-ana').innerText = card.ana;
            document.getElementById('card-fun').innerText = card.fun;
            
            document.getElementById('card-inner').closest('.flip-card').classList.remove('flipped');
            
            hideAllViews();
            cardView.style.display = 'block';
            instruction.style.display = 'block';
        }

        function flipCard() {
            document.getElementById('card-inner').closest('.flip-card').classList.add('flipped');
            instruction.style.display = 'none';
        }

        function finishDiscovery(event) {
            event.stopPropagation();
            
            // On sauvegarde la carte dans la mémoire (Niveau 0)
            saveToMemory(currentCardIndex, 0);
            
            sessionNewCardsCount++;
            analyzeMemory(); // On recalcule la suite
        }

        // --- 5. MODE RÉVISION (Rappel Actif) ---
        function showQuiz() {
            const card = deck[currentCardIndex];
            document.getElementById('quiz-question').innerText = card.quizQ;
            
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            card.quizOpts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, card.quizAns);
                optionsDiv.appendChild(btn);
            });

            hideAllViews();
            quizView.style.display = 'flex';
        }

        function checkAnswer(selectedIndex, correctIndex) {
            const cardMemory = memoryData[currentCardIndex];
            let currentLevel = cardMemory.level;

            if (selectedIndex === correctIndex) {
                alert("Bonne réponse ! 🎉 La carte est ancrée plus profondément.");
                currentLevel++; // On monte de niveau
                // Plafond au niveau max
                if(currentLevel >= INTERVALS.length) currentLevel = INTERVALS.length - 1; 
            } else {
                alert("Faux ! La réponse était : " + deck[currentCardIndex].quizOpts[correctIndex] + "\n\nPas de souci, on reprend l'apprentissage à zéro.");
                currentLevel = 0; // On réinitialise l'oubli
            }

            saveToMemory(currentCardIndex, currentLevel);
            analyzeMemory(); // On passe à la suite
        }

        // --- 6. GESTION DE LA MÉMOIRE LOCALE ---
        function saveToMemory(index, level) {
            const nextReviewTime = Date.now() + INTERVALS[level];
            
            memoryData[index] = {
                level: level,
                nextReview: nextReviewTime
            };
            
            // Sauvegarde physique dans le téléphone
            localStorage.setItem('curio_memory', JSON.stringify(memoryData));
        }

        // --- UTILITAIRES ---
        function hideAllViews() {
            cardView.style.display = 'none';
            quizView.style.display = 'none';
            waitView.style.display = 'none';
            instruction.style.display = 'none';
        }

        function showWaitScreen() {
            hideAllViews();
            waitView.style.display = 'flex';
            statusBadge.innerText = "Repos";
        }

        // Lancement !
        initApp();
    </script>
</body>
</html>
