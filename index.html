<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CurioCartes PWA</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4F46E5">
    <style>
        :root {
            --primary: #4F46E5;
            --secondary: #10B981;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .status-badge {
            background-color: #E0E7FF;
            color: var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .app-container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
        }

        /* Système de Carte 3D */
        .flip-card {
            background-color: transparent;
            width: 100%;
            height: 420px;
            cursor: pointer;
            display: none;
        }

        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
        }

        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }

        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            box-sizing: border-box;
        }

        .flip-card-front { font-size: 1.4rem; font-weight: bold; line-height: 1.4; }
        
        .flip-card-back {
            transform: rotateY(180deg);
            text-align: left;
            font-size: 0.95rem;
            justify-content: flex-start;
            overflow-y: auto;
        }

        .back-section { margin-bottom: 15px; }
        .back-title { font-weight: bold; color: var(--primary); margin-bottom: 4px; font-size: 0.85rem; text-transform: uppercase;}

        /* Ecrans Quiz et Attente */
        .quiz-container, .wait-container {
            display: none;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 350px;
            flex-direction: column;
            justify-content: center;
            box-sizing: border-box;
        }

        .quiz-header {
            color: var(--secondary);
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background-color 0.2s;
        }

        button:hover { background-color: #4338CA; }
        .quiz-btn { background-color: #F3F4F6; color: var(--text-main); text-align: left; padding: 12px 15px; font-weight: normal;}
        .quiz-btn:hover { background-color: #E5E7EB; }

        .instruction {
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            display: none;
        }

        /* NOUVEAU : Design des blocs compte à rebours */
        .timer-box {
            background-color: #F9FAFB;
            border: 1px solid #E5E7EB;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
        }
        .timer-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        .timer-time {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary);
            margin-top: 4px;
        }
        .timer-time.ready {
            color: var(--secondary);
        }
    </style>
</head>
<body>

    <header>
        <h2>CurioCartes</h2>
        <div class="status-badge" id="status-badge">Chargement...</div>
    </header>

    <div class="app-container">
        
        <div class="flip-card" id="card-view" onclick="flipCard()">
            <div class="flip-card-inner" id="card-inner">
                <div class="flip-card-front" id="card-front"></div>
                <div class="flip-card-back">
                    <div class="back-section">
                        <div class="back-title">L'Explication</div>
                        <div id="card-exp"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-title">L'Analogie 💡</div>
                        <div id="card-ana"></div>
                    </div>
                    <div class="back-section">
                        <div class="back-title">Le Fun Fact 🍿</div>
                        <div id="card-fun"></div>
                    </div>
                    <button onclick="finishDiscovery(event)" style="margin-top: auto;">J'ai compris !</button>
                </div>
            </div>
        </div>
        <div class="instruction" id="card-instruction">Appuyez sur la carte pour la retourner</div>

        <div class="quiz-container" id="quiz-view">
            <div class="quiz-header">🧠 Mode Révision</div>
            <p id="quiz-question" style="font-weight: bold; margin-bottom: 20px; font-size: 1.2rem;"></p>
            <div id="quiz-options"></div>
        </div>

        <div class="wait-container" id="wait-view">
            <h3 style="margin-top: 0;">Repos Neuronal 🔋</h3>
            <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 10px;">Ton cerveau assimile les connaissances de la session.</p>
            
            <div class="timer-box">
                <div class="timer-title">🧠 Prochain Quiz Révision</div>
                <div class="timer-time" id="review-countdown">--h --m --s</div>
            </div>

            <div class="timer-box">
                <div class="timer-title">✨ Nouvelles cartes disponibles</div>
                <div class="timer-time" id="discovery-countdown">--h --m --s</div>
            </div>
        </div>

    </div>

    <script>
        // --- CONFIGURATION SCIENTIFIQUE ---
        const COOLDOWN_DISCOVERY = 10 * 1000; // 4 heures de blocage après session de découverte
        const INTERVALS = [
            15 * 1000,      // Niveau 0 -> Révision dans 4h
            24 * 60 * 60 * 1000,     // Niveau 1 -> Révision dans 24h
            3 * 24 * 60 * 60 * 1000, // Niveau 2 -> Révision dans 3 jours
            7 * 24 * 60 * 60 * 1000  // Niveau 3 -> Révision dans 7 jours
        ];
        
        const MAX_NEW_CARDS_PER_SESSION = 3;

        // --- VARIABLES D'ÉTAT ---
        let deck = [];
        let memoryData = JSON.parse(localStorage.getItem('curio_memory')) || {}; 
        let sessionNewCardsCount = parseInt(localStorage.getItem('curio_session_count')) || 0;

        let pendingReviews = []; 
        let availableNewCards = []; 
        let currentCardIndex = null;
        let currentMode = ''; 
        let countdownInterval = null; // Gère la mise à jour des chronos en temps réel

        const cardView = document.getElementById('card-view');
        const quizView = document.getElementById('quiz-view');
        const waitView = document.getElementById('wait-view');
        const instruction = document.getElementById('card-instruction');
        const statusBadge = document.getElementById('status-badge');

        // --- 1. INITIALISATION ---
        async function initApp() {
            try {
                const response = await fetch('cards.json');
                if (!response.ok) throw new Error("Erreur réseau");
                deck = await response.json();
                analyzeMemory();
            } catch (error) {
                console.error("Impossible de charger les cartes.", error);
            }
        }

        // --- 2. ANALYSE ET TRI ---
        function analyzeMemory() {
            const now = Date.now();
            pendingReviews = [];
            availableNewCards = [];

            // Reset du compteur de session si le temps d'attente découverte est expiré
            let nextDiscovery = localStorage.getItem('curio_next_discovery');
            if (nextDiscovery && now >= parseInt(nextDiscovery)) {
                sessionNewCardsCount = 0;
                localStorage.setItem('curio_session_count', 0);
                localStorage.removeItem('curio_next_discovery');
            }

            deck.forEach((card, index) => {
                const cardMemory = memoryData[index];
                if (cardMemory) {
                    if (now >= cardMemory.nextReview) {
                        pendingReviews.push(index);
                    }
                } else {
                    availableNewCards.push(index);
                }
            });

            routeSession();
        }

        // --- 3. AIGUILLAGE ---
        function routeSession() {
            clearInterval(countdownInterval); // On stoppe les chronos s'ils tournaient

            if (pendingReviews.length > 0) {
                currentMode = 'REVIEW';
                currentCardIndex = pendingReviews[0];
                statusBadge.innerText = `🔄 ${pendingReviews.length} Révision(s)`;
                showQuiz();
            } 
            else if (availableNewCards.length > 0 && sessionNewCardsCount < MAX_NEW_CARDS_PER_SESSION) {
                currentMode = 'DISCOVER';
                currentCardIndex = availableNewCards[0];
                statusBadge.innerText = `✨ Découverte`;
                showDiscovery();
            } 
            else {
                showWaitScreen();
            }
        }

        // --- 4. MODE DÉCOUVERTE ---
        function showDiscovery() {
            const card = deck[currentCardIndex];
            document.getElementById('card-front').innerText = card.front;
            document.getElementById('card-exp').innerText = card.exp;
            document.getElementById('card-ana').innerText = card.ana;
            document.getElementById('card-fun').innerText = card.fun;
            document.getElementById('card-inner').closest('.flip-card').classList.remove('flipped');
            
            hideAllViews();
            cardView.style.display = 'block';
            instruction.style.display = 'block';
        }

        function flipCard() {
            document.getElementById('card-inner').closest('.flip-card').classList.add('flipped');
            instruction.style.display = 'none';
        }

        function finishDiscovery(event) {
            event.stopPropagation();
            saveToMemory(currentCardIndex, 0); // Niveau 0
            
            sessionNewCardsCount++;
            localStorage.setItem('curio_session_count', sessionNewCardsCount);
            
            // Si limite atteinte, on enregistre le moment de la prochaine dispo
            if (sessionNewCardsCount >= MAX_NEW_CARDS_PER_SESSION) {
                localStorage.setItem('curio_next_discovery', Date.now() + COOLDOWN_DISCOVERY);
            }
            
            analyzeMemory();
        }

        // --- 5. MODE RÉVISION ---
        function showQuiz() {
            const card = deck[currentCardIndex];
            document.getElementById('quiz-question').innerText = card.quizQ;
            const optionsDiv = document.getElementById('quiz-options');
            optionsDiv.innerHTML = '';
            
            card.quizOpts.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'quiz-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index, card.quizAns);
                optionsDiv.appendChild(btn);
            });

            hideAllViews();
            quizView.style.display = 'flex';
        }

        function checkAnswer(selectedIndex, correctIndex) {
            const cardMemory = memoryData[currentCardIndex];
            let currentLevel = cardMemory.level;

            if (selectedIndex === correctIndex) {
                alert("Bonne réponse ! 🎉");
                currentLevel++;
                if(currentLevel >= INTERVALS.length) currentLevel = INTERVALS.length - 1;
            } else {
                alert("Faux ! La réponse était : " + deck[currentCardIndex].quizOpts[correctIndex] + "\n\nRetour au niveau 0.");
                currentLevel = 0;
            }

            saveToMemory(currentCardIndex, currentLevel);
            analyzeMemory();
        }

        function saveToMemory(index, level) {
            memoryData[index] = {
                level: level,
                nextReview: Date.now() + INTERVALS[level]
            };
            localStorage.setItem('curio_memory', JSON.stringify(memoryData));
        }

        // --- 6. ÉCRAN D'ATTENTE AVEC CHRONOS DYNAMIQUES ---
        function showWaitScreen() {
            hideAllViews();
            waitView.style.display = 'flex';
            statusBadge.innerText = "En attente";

            // Lancement de la boucle des comptes à rebours (1 mise à jour par seconde)
            updateTimersDisplay();
            countdownInterval = setInterval(updateTimersDisplay, 1000);
        }

        function updateTimersDisplay() {
            const now = Date.now();
            let refreshNeeded = false;

            // --- CHRONO 1 : PROCHAIN QUIZ ---
            // On cherche le "nextReview" le plus proche dans le futur
            let earliestReview = Infinity;
            for (let key in memoryData) {
                let time = memoryData[key].nextReview;
                if (time > now && time < earliestReview) {
                    earliestReview = time;
                }
            }

            const reviewEl = document.getElementById('review-countdown');
            if (earliestReview === Infinity) {
                reviewEl.innerText = "Aucun quiz planifié";
                reviewEl.classList.remove('ready');
            } else {
                let diff = earliestReview - now;
                if (diff <= 0) {
                    reviewEl.innerText = "Prêt !";
                    reviewEl.classList.add('ready');
                    refreshNeeded = true;
                } else {
                    reviewEl.innerText = formatTime(diff);
                    reviewEl.classList.remove('ready');
                }
            }

            // --- CHRONO 2 : NOUVELLES CARTES ---
            let nextDiscovery = localStorage.getItem('curio_next_discovery');
            const discoveryEl = document.getElementById('discovery-countdown');

            if (!nextDiscovery || sessionNewCardsCount < MAX_NEW_CARDS_PER_SESSION) {
                discoveryEl.innerText = "Disponible maintenant !";
                discoveryEl.classList.add('ready');
                // Si on est bloqué sur cet écran mais que c'est dispo, on rafraîchit
                if(sessionNewCardsCount >= MAX_NEW_CARDS_PER_SESSION) refreshNeeded = true;
            } else {
                let diff = parseInt(nextDiscovery) - now;
                if (diff <= 0) {
                    discoveryEl.innerText = "Disponible !";
                    discoveryEl.classList.add('ready');
                    refreshNeeded = true;
                } else {
                    discoveryEl.innerText = formatTime(diff);
                    discoveryEl.classList.remove('ready');
                }
            }

            // Si un des chronos vient de se terminer, on relance l'analyse pour débloquer l'appli en direct !
            if (refreshNeeded) {
                analyzeMemory();
            }
        }

        // Traduit les millisecondes en format lisible : 03h 14m 05s
        function formatTime(ms) {
            let totalSeconds = Math.floor(ms / 1000);
            let hours = Math.floor(totalSeconds / 3600);
            let minutes = Math.floor((totalSeconds % 3600) / 60);
            let seconds = totalSeconds % 60;

            return `${String(hours).padStart(2, '0')}h ${String(minutes).padStart(2, '0')}m ${String(seconds).padStart(2, '0')}s`;
        }

        function hideAllViews() {
            cardView.style.display = 'none';
            quizView.style.display = 'none';
            waitView.style.display = 'none';
            instruction.style.display = 'none';
        }

        initApp();
    </script>
</body>
</html>
